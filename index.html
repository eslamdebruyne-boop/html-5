<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>قائمة أسعار معرض أدوات صحية</title>
    <style>
        :root {
            --bg: #0b1220;
            --panel: #111a2e;
            --panel2: #0f1730;
            --text: #e7eefc;
            --muted: #a9b7e6;
            --accent: #4f7cff;
            --accent2: #22c55e;
            --border: rgba(255, 255, 255, .10);
            --shadow: 0 12px 30px rgba(0, 0, 0, .35);
            --radius: 16px;
            --sidebar-width: 330px;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            font-family: Tahoma, Arial, sans-serif;
            background: radial-gradient(1200px 600px at 20% -10%, rgba(79, 124, 255, .25), transparent 60%),
                radial-gradient(900px 500px at 90% 0%, rgba(34, 197, 94, .16), transparent 55%),
                var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        header {
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
            background: rgba(11, 18, 32, .72);
            border-bottom: 1px solid var(--border);
        }

        .wrap {
            max-width: 1200px;
            margin: 0 auto;
            padding: 18px 16px;
        }

        /* ===== Hamburger & Mobile ===== */
        .hamburger {
            display: none;
            background: none;
            border: 1px solid var(--border);
            color: var(--text);
            font-size: 24px;
            padding: 8px 12px;
            border-radius: 12px;
            cursor: pointer;
            line-height: 1;
            transition: .15s;
            flex: 0 0 auto;
        }

        .hamburger:hover {
            border-color: rgba(79, 124, 255, .45);
        }

        .sidebar-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .55);
            z-index: 50;
            opacity: 0;
            transition: opacity .3s;
            pointer-events: none;
        }

        .sidebar-overlay.show {
            opacity: 1;
            pointer-events: all;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .title {
            display: flex;
            flex-direction: column;
            gap: 6px;
            min-width: 0;
        }

        .title h1 {
            font-size: clamp(14px, 4.5vw, 18px);
            margin: 0;
            letter-spacing: .2px;
            line-height: 1.3;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .title p {
            margin: 0;
            color: var(--muted);
            font-size: clamp(11px, 3.2vw, 13px);
        }

        .content {
            display: grid;
            grid-template-columns: var(--sidebar-width) 1fr;
            gap: 16px;
            padding: 16px;
        }

        /* Sidebar */
        .sidebar {
            background: linear-gradient(180deg, rgba(255, 255, 255, .04), rgba(255, 255, 255, .02));
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .sidebar .head {
            padding: 14px 14px 10px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        .sidebar .head .label {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .sidebar .head strong {
            font-size: clamp(13px, 3.5vw, 14px)
        }

        .sidebar .head span {
            font-size: clamp(11px, 3vw, 12px);
            color: var(--muted)
        }

        .sidebar-close {
            display: none;
            background: none;
            border: 1px solid var(--border);
            color: var(--text);
            font-size: 20px;
            border-radius: 10px;
            padding: 4px 10px;
            cursor: pointer;
            line-height: 1;
        }

        .search {
            padding: 0 14px 14px;
        }

        .search input {
            width: 100%;
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: rgba(0, 0, 0, .18);
            color: var(--text);
            outline: none;
            font-size: clamp(13px, 3.5vw, 15px);
            min-height: 44px;
        }

        .search input::placeholder {
            color: rgba(231, 238, 252, .55)
        }

        nav {
            padding: 6px 10px 14px
        }

        .category {
            margin: 10px 6px;
        }

        .cat-btn {
            width: 100%;
            border: 1px solid rgba(255, 255, 255, .10);
            background: rgba(255, 255, 255, .03);
            color: var(--text);
            border-radius: 14px;
            padding: 12px 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            transition: .15s;
            text-align: right;
            font-size: clamp(13px, 3.5vw, 14px);
            min-height: 44px;
        }

        .cat-btn:hover {
            border-color: rgba(79, 124, 255, .45)
        }

        .cat-btn .chev {
            width: 26px;
            height: 26px;
            border-radius: 10px;
            display: grid;
            place-items: center;
            background: rgba(79, 124, 255, .12);
            border: 1px solid rgba(79, 124, 255, .25);
            flex: 0 0 auto;
            transition: .2s;
        }

        .cat-btn[aria-expanded="true"] .chev {
            transform: rotate(180deg)
        }

        .items {
            margin-top: 8px;
            padding-right: 8px;
            display: none;
            gap: 6px;
            flex-direction: column;
        }

        .items.show {
            display: flex
        }

        .item {
            width: 100%;
            text-align: right;
            padding: 12px 12px;
            border-radius: 12px;
            cursor: pointer;
            background: rgba(0, 0, 0, .10);
            border: 1px solid rgba(255, 255, 255, .08);
            color: var(--text);
            transition: .15s;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            font-size: clamp(13px, 3.5vw, 14px);
            min-height: 44px;
        }

        .item:hover {
            border-color: rgba(79, 124, 255, .45)
        }

        .item.active {
            background: rgba(79, 124, 255, .14);
            border-color: rgba(79, 124, 255, .55);
            box-shadow: 0 0 0 2px rgba(79, 124, 255, .10) inset;
        }

        .item small {
            color: var(--muted);
            font-size: clamp(11px, 3vw, 12px);
            flex: 0 0 auto;
        }

        /* Main */
        .main {
            background: linear-gradient(180deg, rgba(255, 255, 255, .04), rgba(255, 255, 255, .02));
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .main .main-head {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            gap: 14px;
            align-items: flex-start;
            justify-content: space-between;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, .12);
            background: rgba(0, 0, 0, .14);
            color: var(--muted);
            font-size: clamp(10px, 2.8vw, 12px);
            white-space: nowrap;
        }

        .badge i {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: var(--accent);
            display: inline-block;
            box-shadow: 0 0 0 3px rgba(79, 124, 255, .18);
        }

        .main .main-head h2 {
            margin: 0;
            font-size: clamp(15px, 4.5vw, 18px);
            word-break: break-word;
        }

        .main .main-head p {
            margin: 6px 0 0;
            color: var(--muted);
            font-size: clamp(12px, 3.5vw, 13px);
            line-height: 1.5;
        }

        .price-pill {
            flex: 0 0 auto;
            align-self: flex-start;
            padding: 12px 14px;
            border-radius: 14px;
            border: 1px solid rgba(34, 197, 94, .35);
            background: rgba(34, 197, 94, .12);
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-width: 150px;
        }

        .price-pill span {
            font-size: clamp(11px, 3vw, 12px);
            color: rgba(231, 238, 252, .70)
        }

        .price-pill strong {
            font-size: clamp(17px, 5vw, 20px);
            letter-spacing: .2px
        }

        .grid {
            padding: 16px;
            display: grid;
            grid-template-columns: 1.2fr .8fr;
            gap: 16px;
            align-items: start;
        }

        .img-card {
            border-radius: 16px;
            border: 1px solid var(--border);
            background: rgba(0, 0, 0, .14);
            overflow: hidden;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, .03);
        }

        .img-card img {
            width: 100%;
            height: 420px;
            object-fit: cover;
            display: block;
            background: rgba(255, 255, 255, .03);
        }

        .details {
            border-radius: 16px;
            border: 1px solid var(--border);
            background: rgba(0, 0, 0, .12);
            padding: 14px;
        }

        .details h3 {
            margin: 0 0 10px;
            font-size: clamp(14px, 4vw, 15px)
        }

        .details .list {
            margin: 0;
            padding: 0;
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .details li {
            padding: 10px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, .08);
            background: rgba(255, 255, 255, .02);
        }

        .details .k {
            color: var(--muted);
            font-size: clamp(11px, 3vw, 12px)
        }

        .details .v {
            margin-top: 4px;
            font-size: clamp(12px, 3.5vw, 13px);
            line-height: 1.6
        }

        footer {
            padding: 18px 16px 32px;
            color: rgba(231, 238, 252, .55);
            text-align: center;
            font-size: clamp(11px, 3vw, 12px);
        }

        .empty {
            padding: 26px;
            color: var(--muted);
            text-align: center;
        }

        /* ====== Responsive ====== */
        @media (max-width: 1024px) {
            .content {
                padding: 12px;
                gap: 12px;
            }

            .grid {
                padding: 12px;
                gap: 12px;
            }

            .main .main-head {
                padding: 12px;
            }

            .wrap {
                padding: 14px 12px;
            }

            .img-card img {
                height: 360px;
            }
        }

        @media (max-width: 768px) {
            .hamburger {
                display: block;
            }

            .sidebar-close {
                display: block;
            }

            .content {
                grid-template-columns: 1fr;
                padding: 10px;
                gap: 10px;
            }

            .sidebar {
                position: fixed;
                top: 0;
                right: 0;
                bottom: 0;
                width: 85%;
                max-width: 380px;
                z-index: 60;
                border-radius: 20px 0 0 20px;
                border: none;
                transform: translateX(100%);
                opacity: 0;
                transition: transform .35s cubic-bezier(.4, 0, .2, 1), opacity .3s;
                background: linear-gradient(180deg, #0d1525, #0a1220);
                box-shadow: -8px 0 30px rgba(0, 0, 0, .5);
                overflow-y: auto;
            }

            .sidebar.open {
                transform: translateX(0);
                opacity: 1;
            }

            .sidebar-overlay.show {
                display: block;
            }

            .grid {
                grid-template-columns: 1fr;
                padding: 10px;
                gap: 10px;
            }

            .price-pill {
                min-width: unset;
                width: 100%;
            }

            .main .main-head {
                flex-direction: column;
                padding: 12px;
                gap: 10px;
            }

            .img-card img {
                height: 280px;
            }

            .details {
                padding: 12px;
            }

            .details li {
                padding: 8px 10px;
            }

            .item {
                padding: 10px 12px;
                min-height: 44px;
            }

            .cat-btn {
                padding: 10px 12px;
                min-height: 44px;
            }

            .search input {
                padding: 10px 12px;
                min-height: 44px;
            }

            .topbar {
                gap: 8px;
            }
        }

        @media (max-width: 480px) {
            .wrap {
                padding: 10px 8px;
            }

            .content {
                padding: 8px;
                gap: 8px;
            }

            .title h1 {
                font-size: clamp(13px, 4vw, 15px);
                white-space: normal;
            }

            .title p {
                font-size: clamp(10px, 2.8vw, 12px);
            }

            .badge {
                font-size: 10px;
                padding: 6px 8px;
                gap: 5px;
            }

            .badge i {
                width: 7px;
                height: 7px;
            }

            .img-card img {
                height: 220px;
            }

            .main .main-head {
                padding: 10px;
            }

            .grid {
                padding: 8px;
            }

            .price-pill {
                padding: 10px 12px;
                min-width: unset;
            }

            .price-pill strong {
                font-size: 16px;
            }

            .sidebar {
                width: 90%;
                max-width: 320px;
            }
        }

        @media (max-width: 360px) {
            .img-card img {
                height: 180px;
            }

            .price-pill strong {
                font-size: 15px;
            }

            .item {
                padding: 6px 8px;
                font-size: 11px;
            }

            .cat-btn {
                padding: 6px 8px;
                font-size: 11px;
            }
        }
    </style>
</head>

        const nav = document.getElementById('nav');
        const searchInput = document.getElementById('searchInput');
        const hamburgerBtn = document.getElementById('hamburgerBtn');
        const sidebarCloseBtn = document.getElementById('sidebarCloseBtn');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebarOverlay');

        const mainTitle = document.getElementById('mainTitle');
        const mainSubtitle = document.getElementById('mainSubtitle');
        const mainPrice = document.getElementById('mainPrice');
        const mainImage = document.getElementById('mainImage');
        const mainDetails = document.getElementById('mainDetails');

        let activeItemId = null;

        function formatPrice(p) {
            if (!p || p === '—') return '—';
            return p;
        }

        function renderDetails(details) {
            mainDetails.innerHTML = '';
            details.forEach(row => {
                const li = document.createElement('li');
                const k = document.createElement('div');
                k.className = 'k';
                k.textContent = row.k;
                const v = document.createElement('div');
                v.className = 'v';
                v.textContent = row.v;
                li.appendChild(k);
                li.appendChild(v);
                mainDetails.appendChild(li);
            });
        }

        function renderMain(item) {
            mainTitle.textContent = item.title;
            mainSubtitle.textContent = '—';
            mainPrice.textContent = formatPrice(item.price);
            mainImage.src = item.image;
            renderDetails(item.details || []);
        }

        function setActive(id) {
            activeItemId = id;
            document.querySelectorAll('.item').forEach(el => {
                el.classList.toggle('active', el.dataset.itemId === id);
            });
        }

        function buildNav(filterText = '') {
            const q = (filterText || '').trim().toLowerCase();
            nav.innerHTML = '';

            products.forEach((cat, catIndex) => {
                const itemsFiltered = cat.items.filter(it => {
                    if (!q) return true;
                    const hay = (it.title + ' ' + (it.details?.map(d => d.v).join(' ') || '')).toLowerCase();
                    return hay.includes(q);
                });

                const categoryDiv = document.createElement('div');
                categoryDiv.className = 'category';

                const btn = document.createElement('button');
                btn.className = 'cat-btn';
                btn.type = 'button';
                btn.setAttribute('aria-expanded', catIndex === 0 && !q ? 'true' : 'false');
                btn.innerHTML = `<span>${cat.category}</span><span class="chev">⌄</span>`;

                const itemsDiv = document.createElement('div');
                itemsDiv.className = 'items' + ((catIndex === 0 && !q) ? ' show' : '');

                btn.addEventListener('click', () => {
                    const expanded = btn.getAttribute('aria-expanded') === 'true';
                    btn.setAttribute('aria-expanded', expanded ? 'false' : 'true');
                    itemsDiv.classList.toggle('show', !expanded);
                });

                if (itemsFiltered.length === 0) {
                    if (q) return;
                }

                itemsFiltered.forEach(item => {
                    const itemBtn = document.createElement('button');
                    itemBtn.type = 'button';
                    itemBtn.className = 'item';
                    itemBtn.dataset.itemId = item.id;
                    itemBtn.innerHTML = `
            <span>${item.title}</span>
            <small>${formatPrice(item.price)}</small>
          `;
                    itemBtn.addEventListener('click', () => {
                        setActive(item.id);
                        renderMain(item);
                        // Close sidebar on mobile after selecting
                        if (window.innerWidth <= 768) {
                            sidebar.classList.remove('open');
                            overlay.classList.remove('show');
                        }
                    });
                    itemsDiv.appendChild(itemBtn);
                });

                categoryDiv.appendChild(btn);
                categoryDiv.appendChild(itemsDiv);
                nav.appendChild(categoryDiv);
            });
        }

        function init() {
            buildNav('');
            const first = products?.[0]?.items?.[0];
            if (first) {
                setActive(first.id);
                renderMain(first);
            }
        }

        // ===== Mobile sidebar events =====
        if (hamburgerBtn) {
            hamburgerBtn.addEventListener('click', () => {
                sidebar.classList.add('open');
                overlay.classList.add('show');
            });
        }

        if (sidebarCloseBtn) {
            sidebarCloseBtn.addEventListener('click', () => {
                sidebar.classList.remove('open');
                overlay.classList.remove('show');
            });
        }

        if (overlay) {
            overlay.addEventListener('click', () => {
                sidebar.classList.remove('open');
                overlay.classList.remove('show');
            });
        }

        searchInput.addEventListener('input', (e) => {
            buildNav(e.target.value);
            const all = products.flatMap(c => c.items);
            const exists = all.some(it => it.id === activeItemId);
            if (!exists) {
                const first = products?.[0]?.items?.[0];
                if (first) {
                    setActive(first.id);
                    renderMain(first);
                }
            }
        });

        init();
    </script>
